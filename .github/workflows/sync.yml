name: LearnWeb Sync — Manueller Fallback

# Dieser Workflow ist nur noch ein manueller Operator-Trigger.
# Er startet KEINEN eigenen Python-Lauf mehr, sondern ruft den
# Railway-Webhook auf, der denselben Sync-Service auf Railway startet.
#
# Primärer Betrieb: Railway-Service mit internem APScheduler
# Fallback: workflow_dispatch → POST an Railway /webhook/sync
#
# Benötigte GitHub Secrets:
#   LEARNWEB_SYNC_WEBHOOK_URL  — vollständige Webhook-URL (z.B. https://…railway.app/webhook/sync)
#   SYNC_WEBHOOK_SECRET        — Bearer-Token (selber Wert wie in Railway gesetzt)

on:
  workflow_dispatch:  # Manueller Trigger per GitHub-UI, keine Parameter nötig

jobs:
  trigger-railway-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Railway-Webhook aufrufen
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.LEARNWEB_SYNC_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SYNC_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP-Status: $HTTP_STATUS"
          echo "Antwort:"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" = "202" ]; then
            echo "✓ Sync erfolgreich gestartet (202 Accepted)."
          elif [ "$HTTP_STATUS" = "409" ]; then
            echo "⚠ Sync läuft bereits auf Railway (409 Conflict) – kein zweiter Start nötig."
            exit 0
          else
            echo "✗ Unerwarteter Status $HTTP_STATUS – bitte Railway-Logs prüfen."
            exit 1
          fi
